spring.application.name=demo

# === MySQL (XAMPP) datasource ===
# Update these values to match your XAMPP/MySQL setup. Example values below assume:
# - database: tagakturo
# - user: tagak_user
# - password: tagakturo2025

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/tagakturo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=tagak_user
spring.datasource.password=tagakturo2025
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate (use update for development; use migrations for production)
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true

# Initialize database with data.sql
# spring.sql.init.mode=always

# Initialize database with data.sql
# spring.sql.init.mode=always

# Optional H2 console is left disabled since using MySQL. If you still want the H2 console,
# re-enable the H2 dependency and console settings.

# Server port (default 8080)
server.port=8080

# JWT settings
jwt.secret=change_this_secret_to_something_long
jwt.expirationMs=86400000

file.upload-dir=uploads
