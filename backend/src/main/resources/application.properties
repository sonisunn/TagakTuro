spring.application.name=demo

# === MySQL DATABASE CONFIGURATION ===
spring.datasource.url=jdbc:mysql://localhost:3306/tagakturo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=tagak_user
spring.datasource.password=tagakturo2025
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Server port (default 8080)
server.port=8080

# JWT settings
jwt.secret=change_this_secret_to_something_long
jwt.expirationMs=86400000

file.upload-dir=uploads

# === MAIL CONFIGURATION (SMTP) ===
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=youremailhere
spring.mail.password=youremailapppassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=true
