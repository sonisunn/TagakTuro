spring.application.name=demo

# === MySQL DATABASE CONFIGURATION ===
spring.datasource.url=jdbc:mysql://localhost:3306/tagakturo?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=tagak_user
spring.datasource.password=tagakturo2025
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.defer-datasource-initialization=true

# Disable SQL initialization initially (let Hibernate create tables first)
spring.sql.init.mode=never

# Server port (default 8080)
server.port=8000

# JWT settings
jwt.secret=change_this_secret_to_something_long
jwt.expirationMs=86400000

file.upload-dir=uploads
